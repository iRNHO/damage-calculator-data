name: Auto Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download latest spreadsheet
        run: python utils/download_latest_sheet.py

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            main.py
            version.txt
            iRNHO's Spreadsheet.xlsx
            assets/**
          body: "Automated release from tag ${{ github.ref_name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}